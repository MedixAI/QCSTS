line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "W"]
ignore = [
    "E501",  # line too long — black handles this
    "F401",  # imported but unused — too strict for __init__ files
]

[lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401", "E402"]
"*/tests/*" = ["F841"]
"manage.py" = ["F401"]
"config/settings/*" = ["F403", "F405", "E402"]