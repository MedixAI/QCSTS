name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev_back_end]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cqsts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/cqsts_test
      REDIS_URL: redis://localhost:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CELERY_BEAT_TIMEZONE: UTC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Check code style with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests with coverage
        run: pytest apps/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/